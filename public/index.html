<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Oksagram - Безопасный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Основные переменные */
        :root {
            --primary: #FFDD00;
            --primary-dark: #e6c400;
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --surface-light: #F0F0F0;
            --text: #333333;
            --text-secondary: #777777;
            --border: #EEEEEE;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Тема WhatsApp */
        body.theme-whatsapp {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #e6ddd4;
            --surface: #ffffff;
            --surface-light: #f0f2f5;
            --text: #3b4a54;
            --text-secondary: #667781;
        }

        /* Тема Telegram */
        body.theme-telegram {
            --primary: #0088cc;
            --primary-dark: #006699;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-light: #e6e6e6;
            --text: #333333;
            --text-secondary: #707579;
        }

        /* Тема Dark */
        body.theme-dark {
            --primary: #7289da;
            --primary-dark: #5b6eae;
            --bg: #36393f;
            --surface: #2f3136;
            --surface-light: #202225;
            --text: #dcddde;
            --text-secondary: #72767d;
            --border: #202225;
        }

        /* Тема iOS */
        body.theme-ios {
            --primary: #007AFF;
            --primary-dark: #005BBF;
            --bg: #F2F2F7;
            --surface: #FFFFFF;
            --surface-light: #E5E5EA;
            --text: #1D1D1F;
            --text-secondary: #636366;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Основной контейнер */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
        }

        /* Шапка списка чатов */
        .header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .menu-btn:active {
            background: var(--surface-light);
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            background: var(--surface);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:active {
            background: var(--surface-light);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--primary);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .chat-last-message {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Область чата (отдельный экран) */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            animation: slideIn 0.3s ease;
        }

        .chat-view.active {
            display: flex;
        }

        .chat-header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:active {
            background: var(--surface-light);
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .chat-header-status {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .chat-header-menu {
            display: flex;
            gap: 8px;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }

        .message.mine {
            align-self: flex-end;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--surface);
            font-size: 0.9rem;
            word-wrap: break-word;
            box-shadow: var(--shadow);
        }

        .message.mine .message-content {
            background: var(--primary);
            color: #000;
        }

        .message-info {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            gap: 12px;
            padding: 0 4px;
        }

        /* Стикеры и фото */
        .message-sticker {
            max-width: 120px;
            max-height: 120px;
            border-radius: 16px;
        }

        .message-photo {
            max-width: 200px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
        }

        .message-audio audio {
            max-width: 200px;
            height: 36px;
        }

        .message-file {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 12px;
        }

        /* Ввод сообщения */
        .input-area {
            background: var(--surface);
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .attach-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attach-btn:active {
            background: var(--surface-light);
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--surface-light);
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .message-input:empty:before {
            content: attr(placeholder);
            color: var(--text-secondary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 28px;
            padding: 28px;
            width: 85%;
            max-width: 340px;
            animation: fadeIn 0.2s ease;
        }

        .modal-content h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: var(--surface-light);
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            color: var(--text);
        }

        .modal-content input:focus {
            outline: 2px solid var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 200;
            white-space: nowrap;
            animation: fadeIn 0.2s ease;
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 150;
            overflow: hidden;
            animation: fadeIn 0.1s ease;
        }

        .context-menu-item {
            padding: 14px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .context-menu-item:active {
            background: var(--surface-light);
        }

        /* Индикатор печати */
        .typing-indicator {
            padding: 8px 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* Скрытые элементы */
        .hidden {
            display: none;
        }

        /* Скролл */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
            .chat-name {
                font-size: 0.9rem;
            }
            .modal-content {
                width: 90%;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Экран списка чатов -->
    <div class="chats-view" id="chatsView">
        <div class="header">
            <span class="logo">⚡ Oksagram</span>
            <div style="display: flex; gap: 4px;">
                <button class="menu-btn" id="newChatBtn" title="Новый чат">📝</button>
                <button class="menu-btn" id="newChannelBtn" title="Новый канал">📢</button>
                <button class="menu-btn" id="themeBtn" title="Сменить тему">🎨</button>
            </div>
        </div>
        <div class="chats-list" id="chatsList">
            <div class="empty-state">Загрузка...</div>
        </div>
    </div>

    <!-- Экран чата -->
    <div class="chat-view" id="chatView">
        <div class="chat-header">
            <button class="back-btn" id="backBtn">←</button>
            <img class="chat-header-avatar" id="chatAvatar" src="">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatName">Чат</div>
                <div class="chat-header-status" id="chatStatus">Онлайн</div>
            </div>
            <div class="chat-header-menu">
                <button class="menu-btn" id="chatInfoBtn" style="width: 36px; height: 36px;">ℹ️</button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">Нет сообщений</div>
        </div>
        <div class="input-area">
            <button class="attach-btn" id="attachBtn" title="Прикрепить">📎</button>
            <div class="message-input" id="messageInput" contenteditable="true" placeholder="Сообщение"></div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <input type="file" id="fileInput" style="display: none;" accept="image/*,audio/*,video/*">
    </div>
</div>

<!-- Модалка входа -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Oksagram</h2>
        <input type="text" id="loginUsername" placeholder="Имя пользователя" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <div class="modal-buttons">
            <button class="btn btn-primary" id="loginBtn">Войти</button>
            <button class="btn btn-secondary" id="showRegisterBtn">Регистрация</button>
        </div>
    </div>
</div>

<!-- Модалка регистрации -->
<div id="registerModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>📝 Регистрация</h2>
        <input type="text" id="regUsername" placeholder="Имя пользователя (3-30 символов)" autocomplete="off">
        <input type="password" id="regPassword" placeholder="Пароль (минимум 6 символов)">
        <input type="password" id="regConfirm" placeholder="Подтвердите пароль">
        <div class="modal-buttons">
            <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
            <button class="btn btn-secondary" id="showLoginBtn">Назад</button>
        </div>
    </div>
</div>

<!-- Модалка информации о чате -->
<div id="chatInfoModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>ℹ️ Информация</h2>
        <div style="text-align: center;">
            <img id="infoAvatar" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px;">
            <h3 id="infoName"></h3>
            <p id="infoId" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;"></p>
        </div>
        <div class="modal-buttons" style="margin-top: 20px;">
            <button class="btn btn-secondary" id="closeInfoBtn">Закрыть</button>
        </div>
    </div>
</div>

<!-- Модалка создания канала -->
<div id="createChannelModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>📢 Создать канал</h2>
        <input type="text" id="channelName" placeholder="Название канала">
        <input type="text" id="channelAdminCode" placeholder="Код администратора">
        <input type="text" id="channelOwnerCode" placeholder="Код владельца">
        <textarea id="channelDesc" placeholder="Описание" rows="2" style="width:100%; padding:12px; background:var(--surface-light); border:none; border-radius:14px; margin-bottom:16px;"></textarea>
        <div class="modal-buttons">
            <button class="btn btn-primary" id="confirmChannelBtn">Создать</button>
            <button class="btn btn-secondary" id="cancelChannelBtn">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ============ СОСТОЯНИЕ ============
    let token = localStorage.getItem('token');
    let currentUser = null;
    let currentChatId = null;
    let currentChat = null;
    let chats = [];
    let ws = null;
    let replyToMessage = null;
    let currentFile = null;

    // ============ ВСПОМОГАТЕЛЬНЫЕ ============
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.background = 'rgba(244,67,54,0.9)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function api(url, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(url, { ...options, headers });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка');
        return data;
    }

    // ============ ТЕМЫ ОФОРМЛЕНИЯ ============
    const themes = ['default', 'theme-whatsapp', 'theme-telegram', 'theme-dark', 'theme-ios'];
    let themeIndex = localStorage.getItem('themeIndex') ? parseInt(localStorage.getItem('themeIndex')) : 0;
    
    function applyTheme() {
        document.body.className = themes[themeIndex];
        localStorage.setItem('themeIndex', themeIndex);
    }
    
    document.getElementById('themeBtn')?.addEventListener('click', () => {
        themeIndex = (themeIndex + 1) % themes.length;
        applyTheme();
        showToast(`Тема: ${themes[themeIndex].replace('theme-', '') || 'Классическая'}`);
    });
    applyTheme();

    // ============ АВТОРИЗАЦИЯ ============
    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showToast('Заполните все поля', true);
        if (username.length < 3) return showToast('Имя от 3 символов', true);
        
        try {
            const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            document.getElementById('authModal').style.display = 'none';
            await loadChats();
            connectWebSocket();
            showToast(`Добро пожаловать, ${username}!`);
        } catch (err) {
            showToast(err.message, true);
        }
    }

    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!username || !password) return showToast('Заполните все поля', true);
        if (password !== confirm) return showToast('Пароли не совпадают', true);
        if (password.length < 6) return showToast('Пароль минимум 6 символов', true);
        if (username.length < 3) return showToast('Имя от 3 символов', true);
        
        try {
            const data = await api('/api/register', { method: 'POST', body: JSON.stringify({ username, password }) });
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            document.getElementById('registerModal').style.display = 'none';
            await loadChats();
            connectWebSocket();
            showToast(`Регистрация успешна!`);
        } catch (err) {
            showToast(err.message, true);
        }
    }

    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        if (ws) ws.close();
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('chatsView').style.display = 'block';
        document.getElementById('chatView').classList.remove('active');
        showToast('Вы вышли из аккаунта');
    }

    // ============ ВЕБСОКЕТ ============
    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws?token=${token}`);
        
        ws.onopen = () => console.log('WebSocket connected');
        
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message' && data.data.chatId === currentChatId) {
                    appendMessage(data.data.message);
                }
                if (data.type === 'new_chat') loadChats();
                if (data.type === 'typing' && data.data.chatId === currentChatId && data.data.userId !== currentUser?.id) {
                    showTypingIndicator(data.data.userName);
                }
            } catch (err) { console.error(err); }
        };
        
        ws.onclose = () => {
            console.log('WebSocket disconnected, reconnecting...');
            setTimeout(connectWebSocket, 3000);
        };
    }
    
    function sendTyping() {
        if (!currentChatId || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'typing', chatId: currentChatId }));
    }
    
    let typingTimeout;
    function showTypingIndicator(userName) {
        const existing = document.querySelector('.typing-indicator');
        if (existing) existing.remove();
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.textContent = `${userName} печатает...`;
        document.getElementById('messagesContainer').appendChild(indicator);
        setTimeout(() => indicator.remove(), 2000);
    }

    // ============ ЧАТЫ ============
    async function loadChats() {
        try {
            const data = await api('/api/chats');
            chats = data;
            renderChats();
        } catch (err) {
            console.error(err);
            document.getElementById('chatsList').innerHTML = '<div class="empty-state">Ошибка загрузки чатов</div>';
        }
    }
    
    function renderChats() {
        const container = document.getElementById('chatsList');
        if (!chats.length) {
            container.innerHTML = '<div class="empty-state">✨ Нет чатов<br>Нажмите ✏️ для создания</div>';
            return;
        }
        
        container.innerHTML = chats.map(chat => `
            <div class="chat-item" data-id="${chat.id}">
                <img class="chat-avatar" src="${chat.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=FFDD00&color=000&bold=true&name=${encodeURIComponent(chat.name)}'">
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name)} ${chat.type === 'private' ? '🔒' : chat.type === 'role-based' ? '📢' : ''}</div>
                    <div class="chat-last-message">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
                </div>
                <div class="chat-time">${chat.lastMessageTime ? new Date(chat.lastMessageTime).toLocaleTimeString().slice(0,5) : ''}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.id));
        });
    }
    
    async function openChat(chatId) {
        currentChatId = chatId;
        currentChat = chats.find(c => c.id === chatId);
        if (!currentChat) return;
        
        document.getElementById('chatName').textContent = currentChat.name;
        document.getElementById('chatAvatar').src = currentChat.avatar;
        document.getElementById('chatsView').style.display = 'none';
        document.getElementById('chatView').classList.add('active');
        
        try {
            const messages = await api(`/api/chats/${chatId}/messages`);
            renderMessages(messages);
        } catch (err) {
            console.error(err);
            showToast('Ошибка загрузки сообщений', true);
        }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        if (!messages.length) {
            container.innerHTML = '<div class="empty-state">💬 Нет сообщений<br>Напишите что-нибудь!</div>';
            return;
        }
        messages.forEach(msg => appendMessage(msg));
        container.scrollTop = container.scrollHeight;
    }
    
    function appendMessage(msg) {
        const container = document.getElementById('messagesContainer');
        const isMine = msg.senderId === currentUser?.id;
        const div = document.createElement('div');
        div.className = `message ${isMine ? 'mine' : ''}`;
        div.dataset.id = msg.id;
        
        let contentHtml = '';
        if (msg.type === 'text') {
            contentHtml = escapeHtml(msg.content || '').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:inherit;text-decoration:underline;">$1</a>');
        } else if (msg.type === 'sticker') {
            contentHtml = `<img src="${msg.content}" class="message-sticker">`;
        } else if (msg.type === 'photo') {
            contentHtml = `<img src="${msg.content}" class="message-photo" onclick="window.open('${msg.content}', '_blank')">`;
        } else if (msg.type === 'audio') {
            contentHtml = `<audio controls src="${msg.content}" class="message-audio"></audio>`;
        } else if (msg.type === 'video') {
            contentHtml = `<video controls src="${msg.content}" style="max-width:200px; max-height:200px; border-radius:12px;"></video>`;
        } else if (msg.type === 'file') {
            contentHtml = `<div class="message-file">📎 <a href="${msg.content}" download="${msg.fileName}" style="color:var(--primary);">${escapeHtml(msg.fileName)}</a></div>`;
        } else {
            contentHtml = escapeHtml(msg.content || '');
        }
        
        div.innerHTML = `
            <div class="message-content">${contentHtml}</div>
            <div class="message-info">
                <span>${isMine ? 'Вы' : escapeHtml(msg.senderName)}</span>
                <span>${new Date(msg.timestamp).toLocaleTimeString().slice(0,5)}</span>
            </div>
        `;
        
        div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e, msg);
        });
        
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) emptyState.remove();
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function showContextMenu(event, message) {
        const existing = document.querySelector('.context-menu');
        if (existing) existing.remove();
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = `${event.clientX}px`;
        menu.style.top = `${event.clientY}px`;
        
        const replyItem = document.createElement('div');
        replyItem.className = 'context-menu-item';
        replyItem.textContent = '📩 Ответить';
        replyItem.onclick = () => {
            replyToMessage = message;
            const indicator = document.getElementById('replyIndicator');
            if (!indicator) {
                const div = document.createElement('div');
                div.id = 'replyIndicator';
                div.className = 'typing-indicator';
                div.style.background = 'var(--surface)';
                div.style.margin = '0 16px';
                div.style.padding = '8px 12px';
                div.style.borderRadius = '12px';
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.innerHTML = `<span>Ответ: ${escapeHtml(message.senderName)}: ${(message.content || '').substring(0, 30)}</span><button id="cancelReplyBtn" style="background:none;border:none;font-size:1.2rem;">✕</button>`;
                document.querySelector('.input-area').before(div);
                document.getElementById('cancelReplyBtn').onclick = () => {
                    replyToMessage = null;
                    div.remove();
                };
            }
            menu.remove();
            document.getElementById('messageInput').focus();
        };
        menu.appendChild(replyItem);
        
        const copyItem = document.createElement('div');
        copyItem.className = 'context-menu-item';
        copyItem.textContent = '📋 Копировать';
        copyItem.onclick = () => {
            navigator.clipboard.writeText(message.content || '');
            showToast('Скопировано');
            menu.remove();
        };
        menu.appendChild(copyItem);
        
        if (message.senderId === currentUser?.id) {
            const deleteItem = document.createElement('div');
            deleteItem.className = 'context-menu-item';
            deleteItem.textContent = '🗑️ Удалить';
            deleteItem.onclick = () => deleteMessage(message.id);
            menu.appendChild(deleteItem);
        }
        
        document.body.appendChild(menu);
        setTimeout(() => {
            document.addEventListener('click', () => menu.remove(), { once: true });
        }, 100);
    }
    
    async function deleteMessage(messageId) {
        if (!confirm('Удалить сообщение?')) return;
        try {
            await api(`/api/chats/${currentChatId}/messages/${messageId}`, { method: 'DELETE' });
            const msgDiv = document.querySelector(`.message[data-id="${messageId}"]`);
            if (msgDiv) msgDiv.remove();
            showToast('Сообщение удалено');
        } catch (err) {
            showToast('Ошибка удаления', true);
        }
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        let content = '';
        input.childNodes.forEach(node => {
            if (node.nodeType === Node.TEXT_NODE) content += node.textContent;
            else if (node.tagName === 'A') content += node.href;
            else if (node.tagName === 'BR') content += '\n';
            else content += node.textContent || '';
        });
        content = content.trim();
        
        if (currentFile) {
            const formData = new FormData();
            formData.append('file', currentFile);
            const res = await fetch(`/api/chats/${currentChatId}/messages`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (res.ok) {
                currentFile = null;
                document.getElementById('fileInput').value = '';
                input.innerHTML = '';
            }
            return;
        }
        
        if (!content) return;
        
        try {
            await api(`/api/chats/${currentChatId}/messages`, {
                method: 'POST',
                body: JSON.stringify({ content, type: 'text', replyTo: replyToMessage?.id })
            });
            input.innerHTML = '';
            replyToMessage = null;
            const replyDiv = document.getElementById('replyIndicator');
            if (replyDiv) replyDiv.remove();
        } catch (err) {
            showToast('Ошибка отправки', true);
        }
    }
    
    // ============ СОЗДАНИЕ ЧАТОВ ============
    async function createPrivateChat() {
        const username = prompt('Введите имя пользователя:');
        if (!username) return;
        try {
            const users = await api(`/api/users/search?q=${encodeURIComponent(username)}`);
            if (!users.length) return showToast('Пользователь не найден', true);
            const data = await api('/api/chats', {
                method: 'POST',
                body: JSON.stringify({ type: 'private', participantIds: [users[0].id] })
            });
            await loadChats();
            openChat(data.chatId);
            showToast('Чат создан!');
        } catch (err) {
            showToast(err.message, true);
        }
    }
    
    async function createChannel() {
        const name = document.getElementById('channelName').value.trim();
        const adminCode = document.getElementById('channelAdminCode').value.trim();
        const ownerCode = document.getElementById('channelOwnerCode').value.trim();
        const description = document.getElementById('channelDesc').value.trim();
        
        if (!name || !adminCode || !ownerCode) {
            showToast('Заполните название и коды', true);
            return;
        }
        
        try {
            await api('/api/chats', {
                method: 'POST',
                body: JSON.stringify({ type: 'role-based', name, adminCode, ownerCode, description })
            });
            document.getElementById('createChannelModal').style.display = 'none';
            document.getElementById('channelName').value = '';
            document.getElementById('channelAdminCode').value = '';
            document.getElementById('channelOwnerCode').value = '';
            document.getElementById('channelDesc').value = '';
            await loadChats();
            showToast('Канал создан!');
        } catch (err) {
            showToast(err.message, true);
        }
    }
    
    // ============ ИНФОРМАЦИЯ О ЧАТЕ ============
    async function showChatInfo() {
        if (!currentChat) return;
        document.getElementById('infoAvatar').src = currentChat.avatar;
        document.getElementById('infoName').textContent = currentChat.name;
        document.getElementById('infoId').textContent = `ID: ${currentChat.id}`;
        document.getElementById('chatInfoModal').style.display = 'flex';
    }
    
    // ============ ЗАГРУЗКА ФАЙЛОВ ============
    document.getElementById('attachBtn')?.addEventListener('click', () => {
        document.getElementById('fileInput').click();
    });
    
    document.getElementById('fileInput')?.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            currentFile = e.target.files[0];
            sendMessage();
        }
    });
    
    // ============ ИНИЦИАЛИЗАЦИЯ ============
    document.getElementById('newChatBtn')?.addEventListener('click', createPrivateChat);
    document.getElementById('newChannelBtn')?.addEventListener('click', () => {
        document.getElementById('createChannelModal').style.display = 'flex';
    });
    document.getElementById('confirmChannelBtn')?.addEventListener('click', createChannel);
    document.getElementById('cancelChannelBtn')?.addEventListener('click', () => {
        document.getElementById('createChannelModal').style.display = 'none';
    });
    document.getElementById('backBtn')?.addEventListener('click', () => {
        document.getElementById('chatsView').style.display = 'block';
        document.getElementById('chatView').classList.remove('active');
        currentChatId = null;
        replyToMessage = null;
        const replyDiv = document.getElementById('replyIndicator');
        if (replyDiv) replyDiv.remove();
    });
    document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
    document.getElementById('chatInfoBtn')?.addEventListener('click', showChatInfo);
    document.getElementById('closeInfoBtn')?.addEventListener('click', () => {
        document.getElementById('chatInfoModal').style.display = 'none';
    });
    
    document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        sendTyping();
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {}, 1000);
    });
    
    // Кнопки авторизации
    document.getElementById('loginBtn')?.addEventListener('click', login);
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('registerModal').style.display = 'flex';
    });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        document.getElementById('registerModal').style.display = 'none';
        document.getElementById('authModal').style.display = 'flex';
    });
    document.getElementById('registerBtn')?.addEventListener('click', register);
    
    // Проверка авторизации при загрузке
    if (token) {
        api('/api/verify', { method: 'POST', body: JSON.stringify({ token }) })
            .then(data => {
                if (data.valid) {
                    currentUser = data.user;
                    document.getElementById('authModal').style.display = 'none';
                    loadChats();
                    connectWebSocket();
                } else {
                    document.getElementById('authModal').style.display = 'flex';
                }
            })
            .catch(() => {
                document.getElementById('authModal').style.display = 'flex';
            });
    } else {
        document.getElementById('authModal').style.display = 'flex';
    }
</script>
</body>
