<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Oksagram - Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ============ ТЕМЫ ОФОРМЛЕНИЯ ============ */
        :root {
            --primary: #FFDD00;
            --primary-dark: #e6c400;
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --surface-light: #F0F0F0;
            --text: #333333;
            --text-secondary: #777777;
            --border: #EEEEEE;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --error: #f44336;
            --success: #4CAF50;
        }

        body.theme-whatsapp {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #e6ddd4;
            --surface: #ffffff;
            --surface-light: #f0f2f5;
            --text: #3b4a54;
            --text-secondary: #667781;
        }

        body.theme-telegram {
            --primary: #0088cc;
            --primary-dark: #006699;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-light: #e6e6e6;
            --text: #333333;
            --text-secondary: #707579;
        }

        body.theme-dark {
            --primary: #7289da;
            --primary-dark: #5b6eae;
            --bg: #36393f;
            --surface: #2f3136;
            --surface-light: #202225;
            --text: #dcddde;
            --text-secondary: #72767d;
            --border: #202225;
        }

        body.theme-ios {
            --primary: #007AFF;
            --primary-dark: #005BBF;
            --bg: #F2F2F7;
            --surface: #FFFFFF;
            --surface-light: #E5E5EA;
            --text: #1D1D1F;
            --text-secondary: #636366;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Основной контейнер */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка */
        .header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .menu-btn:active {
            background: var(--surface-light);
        }

        /* Вкладки навигации */
        .nav-tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            gap: 8px;
        }

        .nav-tab {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Списки */
        .chats-list, .channels-list, .temats-list {
            flex: 1;
            overflow-y: auto;
            background: var(--surface);
            display: none;
        }

        .chats-list.active, .channels-list.active, .temats-list.active {
            display: block;
        }

        .chat-item, .channel-item, .temat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:active, .channel-item:active, .temat-item:active {
            background: var(--surface-light);
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--primary);
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-badge {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Область чата */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            animation: slideIn 0.3s ease;
        }

        .chat-view.active {
            display: flex;
        }

        .chat-header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50%;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .chat-header-status {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }

        .message.mine {
            align-self: flex-end;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--surface);
            font-size: 0.9rem;
            word-wrap: break-word;
            box-shadow: var(--shadow);
        }

        .message.mine .message-content {
            background: var(--primary);
            color: #000;
        }

        .message-info {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            gap: 12px;
            padding: 0 4px;
        }

        .message.important {
            border-left: 3px solid var(--primary);
        }

        /* Посты */
        .post {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .post.pinned {
            border: 2px solid var(--primary);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .post-author {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .post-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .post-content {
            margin-bottom: 12px;
            line-height: 1.4;
            font-size: 0.9rem;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .post-action {
            background: none;
            border: none;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .post-action:active {
            color: var(--primary);
        }

        /* Комментарии */
        .comments-section {
            margin-top: 12px;
            padding-left: 20px;
        }

        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--surface-light);
            border-radius: 12px;
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.8rem;
        }

        .comment-text {
            font-size: 0.85rem;
        }

        /* Ввод сообщения */
        .input-area {
            background: var(--surface);
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .attach-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--surface-light);
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
            max-height: 100px;
            overflow-y: auto;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: var(--surface-light);
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 200;
            white-space: nowrap;
        }

        /* Стикеры */
        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .sticker-item {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            cursor: pointer;
            background: var(--surface-light);
            border-radius: 12px;
            padding: 8px;
        }

        /* Студенты для школьного чата */
        .student-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .student-badge {
            background: var(--surface-light);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Главный экран со списками -->
    <div class="main-view" id="mainView">
        <div class="header">
            <span class="logo">⚡ Oksagram</span>
            <div style="display: flex; gap: 4px;">
                <button class="menu-btn" id="createChatBtn" title="Создать чат">📝</button>
                <button class="menu-btn" id="themeBtn" title="Сменить тему">🎨</button>
                <button class="menu-btn" id="profileBtn" title="Профиль">👤</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="chats">💬 Чаты</button>
            <button class="nav-tab" data-tab="channels">📢 Каналы</button>
            <button class="nav-tab" data-tab="temats">🔥 Тематы</button>
        </div>

        <div class="chats-list active" id="chatsList">
            <div class="empty-state">Загрузка...</div>
        </div>

        <div class="channels-list" id="channelsList">
            <div class="empty-state">Загрузка...</div>
        </div>

        <div class="temats-list" id="tematsList">
            <div class="empty-state">Загрузка...</div>
        </div>
    </div>

    <!-- Экран чата -->
    <div class="chat-view" id="chatView">
        <div class="chat-header">
            <button class="back-btn" id="backBtn">←</button>
            <img class="chat-header-avatar" id="chatAvatar" src="">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatName">Чат</div>
                <div class="chat-header-status" id="chatStatus"></div>
            </div>
            <button class="menu-btn" id="chatMenuBtn" style="width: 36px;">⋮</button>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <button class="attach-btn" id="attachBtn">📎</button>
            <button class="attach-btn" id="stickerBtn" style="display: none;">😊</button>
            <div class="message-input" id="messageInput" contenteditable="true" placeholder="Сообщение"></div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <input type="file" id="fileInput" style="display: none;" accept="image/*,audio/*,video/*">
    </div>
</div>

<!-- ============ МОДАЛЬНЫЕ ОКНА ============ -->

<!-- Авторизация -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Oksagram</h2>
        <input type="text" id="loginUsername" placeholder="Имя пользователя">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <div class="modal-buttons">
            <button class="btn btn-primary" id="loginBtn">Войти</button>
            <button class="btn btn-secondary" id="showRegisterBtn">Регистрация</button>
        </div>
    </div>
</div>

<div id="registerModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>📝 Регистрация</h2>
        <input type="text" id="regUsername" placeholder="Имя (3-30 символов)">
        <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
        <input type="password" id="regConfirm" placeholder="Подтвердите пароль">
        <div class="modal-buttons">
            <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
            <button class="btn btn-secondary" id="showLoginBtn">Назад</button>
        </div>
    </div>
</div>

<!-- Создание чата -->
<div id="createChatModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>✨ Создать</h2>
        <div class="nav-tabs" style="margin-bottom: 16px;">
            <button class="nav-tab active" data-create-type="private">💬 Личный</button>
            <button class="nav-tab" data-create-type="group">👥 Группа</button>
            <button class="nav-tab" data-create-type="role-based">📢 Канал</button>
            <button class="nav-tab" data-create-type="school">🏫 Школьный</button>
            <button class="nav-tab" data-create-type="community">🌐 Сообщество</button>
        </div>
        
        <div id="privateCreate">
            <input type="text" id="privateUserSearch" placeholder="Имя пользователя">
            <div id="privateUsersList" class="student-list"></div>
        </div>
        
        <div id="groupCreate" style="display: none;">
            <input type="text" id="groupName" placeholder="Название группы">
            <input type="text" id="groupUserSearch" placeholder="Поиск участников">
            <div id="groupUsersList" class="student-list"></div>
            <div id="selectedUsersList" class="student-list"></div>
        </div>
        
        <div id="channelCreate" style="display: none;">
            <input type="text" id="channelName" placeholder="Название канала">
            <input type="text" id="channelAdminCode" placeholder="Код администратора">
            <input type="text" id="channelOwnerCode" placeholder="Код владельца">
            <textarea id="channelDesc" placeholder="Описание" rows="2"></textarea>
            <label><input type="checkbox" id="channelPublic"> Публичный канал</label>
        </div>
        
        <div id="schoolCreate" style="display: none;">
            <input type="text" id="schoolClassName" placeholder="Название класса">
            <input type="text" id="teacherSearch" placeholder="Поиск учителя">
            <div id="teacherList" class="student-list"></div>
            <div id="selectedTeacher" class="student-badge" style="display: none;"></div>
            <div id="schoolStudentsContainer"></div>
            <button class="btn btn-secondary" id="addStudentBtn" style="margin-top: 8px;">+ Добавить ученика</button>
        </div>
        
        <div id="communityCreate" style="display: none;">
            <input type="text" id="communityName" placeholder="Название сообщества">
            <textarea id="communityDesc" placeholder="Описание" rows="2"></textarea>
            <input type="text" id="communityAdminCode" placeholder="Код администратора">
            <input type="text" id="communityOwnerCode" placeholder="Код владельца">
        </div>
        
        <div class="modal-buttons">
            <button class="btn btn-primary" id="confirmCreateBtn">Создать</button>
            <button class="btn btn-secondary" id="cancelCreateBtn">Отмена</button>
        </div>
    </div>
</div>

<!-- Вход в канал -->
<div id="joinChannelModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>📢 Вход в канал</h2>
        <div class="nav-tabs" style="margin-bottom: 16px;">
            <button class="nav-tab active" data-join-role="participant">👤 Участник</button>
            <button class="nav-tab" data-join-role="admin">👑 Админ</button>
            <button class="nav-tab" data-join-role="owner">⭐ Владелец</button>
        </div>
        <div id="adminCodeField" style="display: none;">
            <input type="password" id="joinAdminCode" placeholder="Код администратора">
        </div>
        <div id="ownerCodeField" style="display: none;">
            <input type="password" id="joinOwnerCode" placeholder="Код владельца">
        </div>
        <div class="modal-buttons">
            <button class="btn btn-primary" id="confirmJoinChannelBtn">Присоединиться</button>
            <button class="btn btn-secondary" id="cancelJoinChannelBtn">Отмена</button>
        </div>
    </div>
</div>

<!-- Школьное ЦДЗ -->
<div id="quizModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <h2 id="quizTitle">ЦДЗ</h2>
        <div id="quizQuestions"></div>
        <div class="modal-buttons">
            <button class="btn btn-primary" id="submitQuizBtn">Отправить</button>
            <button class="btn btn-secondary" id="closeQuizBtn">Закрыть</button>
        </div>
    </div>
</div>

<!-- Стикеры -->
<div id="stickersModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>😊 Стикеры</h2>
        <div class="nav-tabs" style="margin-bottom: 16px;">
            <button class="nav-tab active" data-sticker-tab="global">🌍 Глобальные</button>
            <button class="nav-tab" data-sticker-tab="favorite">⭐ Избранные</button>
        </div>
        <div id="globalStickersGrid" class="stickers-grid"></div>
        <div id="favoriteStickersGrid" class="stickers-grid" style="display: none;"></div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" id="closeStickersBtn">Закрыть</button>
        </div>
    </div>
</div>

<!-- Информация о чате -->
<div id="chatInfoModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>ℹ️ Информация</h2>
        <div style="text-align: center;">
            <img id="infoAvatar" style="width: 80px; height: 80px; border-radius: 50%;">
            <h3 id="infoName"></h3>
            <p id="infoType" style="font-size: 0.8rem; color: var(--text-secondary);"></p>
        </div>
        <div id="infoParticipants"></div>
        <div id="infoSchoolQuiz" style="display: none; margin-top: 16px;">
            <strong>📋 Текущее ЦДЗ:</strong>
            <div id="currentQuizInfo"></div>
            <button class="btn btn-primary" id="takeQuizBtn" style="margin-top: 8px;">Пройти</button>
        </div>
        <div class="modal-buttons">
            <button class="btn btn-secondary" id="closeInfoBtn">Закрыть</button>
        </div>
    </div>
</div>

<!-- Профиль -->
<div id="profileModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>👤 Профиль</h2>
        <div style="text-align: center;">
            <img id="profileAvatar" style="width: 80px; height: 80px; border-radius: 50%; cursor: pointer;">
        </div>
        <input type="text" id="profileUsername" placeholder="Имя" disabled>
        <div class="modal-buttons">
            <button class="btn btn-danger" id="logoutBtn">Выйти</button>
            <button class="btn btn-secondary" id="closeProfileBtn">Закрыть</button>
        </div>
        <input type="file" id="avatarUpload" style="display: none;" accept="image/*">
    </div>
</div>

<script>
    // ============ СОСТОЯНИЕ ============
    let token = localStorage.getItem('token');
    let currentUser = null;
    let currentChatId = null;
    let currentChat = null;
    let chats = [];
    let channels = [];
    let temats = [];
    let ws = null;
    let replyToMessage = null;
    let currentFile = null;
    let selectedCreateType = 'private';
    let selectedParticipants = [];
    let selectedTeacher = null;
    let schoolStudents = [];
    let pendingChannelId = null;
    let selectedJoinRole = 'participant';
    let currentQuiz = null;

    // ============ ВСПОМОГАТЕЛЬНЫЕ ============
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.background = 'rgba(244,67,54,0.9)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function api(url, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(url, { ...options, headers });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка');
        return data;
    }

    // ============ ТЕМЫ ============
    const themes = ['default', 'theme-whatsapp', 'theme-telegram', 'theme-dark', 'theme-ios'];
    let themeIndex = localStorage.getItem('themeIndex') ? parseInt(localStorage.getItem('themeIndex')) : 0;
    
    function applyTheme() {
        document.body.className = themes[themeIndex];
        localStorage.setItem('themeIndex', themeIndex);
    }
    
    document.getElementById('themeBtn')?.addEventListener('click', () => {
        themeIndex = (themeIndex + 1) % themes.length;
        applyTheme();
        showToast(`Тема: ${themes[themeIndex].replace('theme-', '') || 'Классическая'}`);
    });
    applyTheme();

    // ============ АВТОРИЗАЦИЯ ============
    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showToast('Заполните поля', true);
        
        try {
            const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            document.getElementById('authModal').style.display = 'none';
            await loadAllData();
            connectWebSocket();
            showToast(`Добро пожаловать, ${username}!`);
        } catch (err) {
            showToast(err.message, true);
        }
    }

    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!username || !password) return showToast('Заполните поля', true);
        if (password !== confirm) return showToast('Пароли не совпадают', true);
        if (password.length < 6) return showToast('Пароль минимум 6 символов', true);
        if (username.length < 3) return showToast('Имя от 3 символов', true);
        
        try {
            const data = await api('/api/register', { method: 'POST', body: JSON.stringify({ username, password }) });
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('token', token);
            document.getElementById('registerModal').style.display = 'none';
            await loadAllData();
            connectWebSocket();
            showToast('Регистрация успешна!');
        } catch (err) {
            showToast(err.message, true);
        }
    }

    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        if (ws) ws.close();
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('chatView').classList.remove('active');
        showToast('Вы вышли');
    }

    // ============ ЗАГРУЗКА ДАННЫХ ============
    async function loadAllData() {
        await loadChats();
        await loadChannels();
        await loadTemats();
    }

    async function loadChats() {
        try {
            const data = await api('/api/chats');
            chats = data;
            renderChats();
        } catch (err) {
            console.error(err);
        }
    }

    async function loadChannels() {
        try {
            const data = await api('/api/channels/public');
            channels = data;
            renderChannels();
        } catch (err) {
            console.error(err);
        }
    }

    async function loadTemats() {
        try {
            const data = await api('/api/temats');
            temats = data;
            renderTemats();
        } catch (err) {
            console.error(err);
        }
    }

    function renderChats() {
        const container = document.getElementById('chatsList');
        if (!chats.length) {
            container.innerHTML = '<div class="empty-state">✨ Нет чатов<br>Нажмите ✏️ для создания</div>';
            return;
        }
        container.innerHTML = chats.map(chat => `
            <div class="chat-item" data-id="${chat.id}">
                <img class="avatar" src="${chat.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=FFDD00&color=000&name=${encodeURIComponent(chat.name)}'">
                <div class="item-info">
                    <div class="item-name">${escapeHtml(chat.name)} ${chat.type === 'private' ? '🔒' : chat.type === 'role-based' ? '📢' : chat.type === 'school' ? '🏫' : chat.type === 'community' ? '🌐' : ''}</div>
                    <div class="item-desc">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
                </div>
                <div class="item-badge">${chat.lastMessageTime ? new Date(chat.lastMessageTime).toLocaleTimeString().slice(0,5) : ''}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('#chatsList .chat-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.id));
        });
    }

    function renderChannels() {
        const container = document.getElementById('channelsList');
        if (!channels.length) {
            container.innerHTML = '<div class="empty-state">📢 Нет публичных каналов</div>';
            return;
        }
        container.innerHTML = channels.map(ch => `
            <div class="channel-item" data-id="${ch.id}">
                <img class="avatar" src="${ch.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=FFDD00&color=000&name=${encodeURIComponent(ch.name)}'">
                <div class="item-info">
                    <div class="item-name">${escapeHtml(ch.name)}</div>
                    <div class="item-desc">${escapeHtml(ch.description || '')}</div>
                </div>
                <div class="item-badge">👥 ${ch.subscribersCount || 0}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('#channelsList .channel-item').forEach(el => {
            el.addEventListener('click', () => showJoinChannelModal(el.dataset.id));
        });
    }

    function renderTemats() {
        const container = document.getElementById('tematsList');
        if (!temats.length) {
            container.innerHTML = '<div class="empty-state">🔥 Тематы загружаются...</div>';
            return;
        }
        container.innerHTML = temats.map(t => `
            <div class="temat-item" data-id="${t.id}">
                <img class="avatar" src="${t.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=FFDD00&color=000&name=${encodeURIComponent(t.name)}'">
                <div class="item-info">
                    <div class="item-name">${escapeHtml(t.name)}</div>
                    <div class="item-desc">${escapeHtml(t.description)}</div>
                </div>
                <div class="item-badge">👥 ${t.participantsCount || 0}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('#tematsList .temat-item').forEach(el => {
            el.addEventListener('click', () => joinTemat(el.dataset.id));
        });
    }

    // ============ ВЕБСОКЕТ ============
    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws?token=${token}`);
        
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (data.type === 'new_message' && data.data.chatId === currentChatId) {
                    appendMessage(data.data.message);
                }
                if (data.type === 'new_chat') loadAllData();
                if (data.type === 'typing' && data.data.chatId === currentChatId && data.data.userId !== currentUser?.id) {
                    showTypingIndicator(data.data.userName);
                }
            } catch (err) {}
        };
        
        ws.onclose = () => setTimeout(connectWebSocket, 3000);
    }

    function sendTyping() {
        if (!currentChatId || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'typing', chatId: currentChatId }));
    }

    function showTypingIndicator(userName) {
        const existing = document.querySelector('.typing-indicator');
        if (existing) existing.remove();
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.textContent = `${userName} печатает...`;
        document.getElementById('messagesContainer').appendChild(indicator);
        setTimeout(() => indicator.remove(), 2000);
    }

    // ============ ЧАТЫ И СООБЩЕНИЯ ============
    async function openChat(chatId) {
        currentChatId = chatId;
        currentChat = chats.find(c => c.id === chatId) || channels.find(c => c.id === chatId) || temats.find(t => t.id === chatId);
        if (!currentChat) return;
        
        document.getElementById('chatName').textContent = currentChat.name;
        document.getElementById('chatAvatar').src = currentChat.avatar;
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('chatView').classList.add('active');
        
        try {
            const messages = await api(`/api/chats/${chatId}/messages`);
            renderMessages(messages);
            if (currentChat.type === 'school') await loadSchoolQuiz(chatId);
        } catch (err) {
            showToast('Ошибка загрузки сообщений', true);
        }
    }

    function renderMessages(messages) {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        if (!messages.length) {
            container.innerHTML = '<div class="empty-state">💬 Нет сообщений</div>';
            return;
        }
        messages.forEach(msg => {
            if (msg.type === 'post') appendPost(msg);
            else appendMessage(msg);
        });
        container.scrollTop = container.scrollHeight;
    }

    function appendMessage(msg) {
        const container = document.getElementById('messagesContainer');
        const isMine = msg.senderId === currentUser?.id;
        const div = document.createElement('div');
        div.className = `message ${isMine ? 'mine' : ''}`;
        if (msg.important) div.classList.add('important');
        div.dataset.id = msg.id;
        
        let contentHtml = '';
        if (msg.type === 'text') {
            contentHtml = escapeHtml(msg.content || '').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:inherit;text-decoration:underline;">$1</a>');
        } else if (msg.type === 'sticker') {
            contentHtml = `<img src="${msg.content}" style="max-width:120px; max-height:120px; border-radius:16px;">`;
        } else if (msg.type === 'photo') {
            contentHtml = `<img src="${msg.content}" style="max-width:200px; max-height:200px; border-radius:16px; cursor:pointer;" onclick="window.open('${msg.content}','_blank')">`;
        } else if (msg.type === 'audio') {
            contentHtml = `<audio controls src="${msg.content}" style="max-width:200px; height:36px;"></audio>`;
        } else if (msg.type === 'file') {
            contentHtml = `<div style="display:flex; align-items:center; gap:10px;"><span>📎</span><a href="${msg.content}" download="${msg.fileName}" style="color:var(--primary);">${escapeHtml(msg.fileName)}</a></div>`;
        } else {
            contentHtml = escapeHtml(msg.content || '');
        }
        
        div.innerHTML = `
            <div class="message-content">${contentHtml}</div>
            <div class="message-info">
                <span>${isMine ? 'Вы' : escapeHtml(msg.senderName)}</span>
                <span>${new Date(msg.timestamp).toLocaleTimeString().slice(0,5)}</span>
            </div>
        `;
        
        div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showMessageContextMenu(e, msg);
        });
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function appendPost(post) {
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = `post ${post.pinned ? 'pinned' : ''}`;
        div.dataset.id = post.id;
        
        const likesCount = Object.keys(post.likes || {}).length;
        const commentsCount = post.comments?.length || 0;
        
        div.innerHTML = `
            <div class="post-header">
                <img class="post-avatar" src="${post.senderAvatar || 'https://ui-avatars.com/api/?background=FFDD00&color=000&name=' + encodeURIComponent(post.senderName)}">
                <div>
                    <div class="post-author">${escapeHtml(post.senderName)}</div>
                    <div class="post-time">${new Date(post.timestamp).toLocaleString()}</div>
                </div>
            </div>
            <div class="post-content">${escapeHtml(post.content || '')}</div>
            <div class="post-actions">
                <button class="post-action like-btn" data-id="${post.id}">❤️ ${likesCount}</button>
                <button class="post-action comment-btn" data-id="${post.id}">💬 ${commentsCount}</button>
                <button class="post-action forward-btn" data-id="${post.id}">📤</button>
            </div>
            <div class="comments-section" id="comments-${post.id}" style="display: none;">
                <div class="comments-list"></div>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input type="text" class="comment-input" placeholder="Написать комментарий..." style="flex:1; padding:8px 12px; background:var(--surface-light); border:none; border-radius:20px;">
                    <button class="send-comment-btn" data-id="${post.id}" style="background:var(--primary); border:none; border-radius:50%; width:36px; height:36px;">➤</button>
                </div>
            </div>
        `;
        
        container.appendChild(div);
        
        div.querySelector('.like-btn')?.addEventListener('click', () => toggleLike(post.id));
        div.querySelector('.comment-btn')?.addEventListener('click', () => {
            const section = div.querySelector(`#comments-${post.id}`);
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
            if (section.style.display === 'block') renderComments(post.id, post.comments || []);
        });
        div.querySelector('.send-comment-btn')?.addEventListener('click', () => {
            const input = div.querySelector('.comment-input');
            if (input.value.trim()) addComment(post.id, input.value);
        });
    }

    function renderComments(postId, comments) {
        const container = document.querySelector(`#comments-${postId} .comments-list`);
        if (!container) return;
        container.innerHTML = comments.map(c => `
            <div class="comment">
                <img class="comment-avatar" src="${c.senderAvatar || 'https://ui-avatars.com/api/?background=FFDD00&color=000&name=' + encodeURIComponent(c.senderName)}">
                <div class="comment-content">
                    <div class="comment-author">${escapeHtml(c.senderName)}</div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                    <div style="font-size:0.7rem; color:var(--text-secondary);">${new Date(c.timestamp).toLocaleTimeString()}</div>
                </div>
            </div>
        `).join('');
    }

    async function toggleLike(postId) {
        try {
            await api(`/api/chats/${currentChatId}/posts/${postId}/like`, { method: 'POST' });
        } catch (err) {}
    }

    async function addComment(postId, text) {
        try {
            await api(`/api/chats/${currentChatId}/posts/${postId}/comments`, { method: 'POST', body: JSON.stringify({ text }) });
        } catch (err) {}
    }

    function showMessageContextMenu(event, message) {
        const existing = document.querySelector('.context-menu');
        if (existing) existing.remove();
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = `${event.clientX}px`;
        menu.style.top = `${event.clientY}px`;
        
        const items = [
            { text: '📩 Ответить', action: () => setReply(message) },
            { text: '📋 Копировать', action: () => { navigator.clipboard.writeText(message.content || ''); showToast('Скопировано'); } },
            { text: '⭐ В избранное', action: () => addToFavorites(message) },
            { text: '📤 В буфер', action: () => addToForwardBuffer(message) }
        ];
        
        if (message.senderId === currentUser?.id) {
            items.push({ text: '🗑️ Удалить', action: () => deleteMessage(message.id) });
        }
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'context-menu-item';
            div.textContent = item.text;
            div.onclick = () => { item.action(); menu.remove(); };
            menu.appendChild(div);
        });
        
        document.body.appendChild(menu);
        setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 100);
    }

    function setReply(message) {
        replyToMessage = message;
        const indicator = document.getElementById('replyIndicator');
        if (indicator) indicator.remove();
        const div = document.createElement('div');
        div.id = 'replyIndicator';
        div.style.cssText = 'background:var(--surface); padding:8px 16px; margin:0 16px; border-left:3px solid var(--primary); font-size:0.8rem; display:flex; justify-content:space-between;';
        div.innerHTML = `<span>Ответ: ${escapeHtml(message.senderName)}: ${(message.content || '').substring(0, 40)}</span><button id="cancelReplyBtn" style="background:none; border:none; font-size:1.2rem;">✕</button>`;
        document.querySelector('.input-area').before(div);
        document.getElementById('cancelReplyBtn').onclick = () => { replyToMessage = null; div.remove(); };
        document.getElementById('messageInput').focus();
    }

    async function deleteMessage(messageId) {
        if (!confirm('Удалить сообщение?')) return;
        try {
            await api(`/api/chats/${currentChatId}/messages/${messageId}`, { method: 'DELETE' });
            const msgDiv = document.querySelector(`.message[data-id="${messageId}"]`);
            if (msgDiv) msgDiv.remove();
            showToast('Удалено');
        } catch (err) {}
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        let content = '';
        input.childNodes.forEach(node => {
            if (node.nodeType === Node.TEXT_NODE) content += node.textContent;
            else if (node.tagName === 'A') content += node.href;
            else if (node.tagName === 'BR') content += '\n';
            else content += node.textContent || '';
        });
        content = content.trim();
        
        if (currentFile) {
            const formData = new FormData();
            formData.append('file', currentFile);
            await fetch(`/api/chats/${currentChatId}/messages`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            currentFile = null;
            document.getElementById('fileInput').value = '';
            input.innerHTML = '';
            return;
        }
        
        if (!content) return;
        
        try {
            await api(`/api/chats/${currentChatId}/messages`, {
                method: 'POST',
                body: JSON.stringify({ content, type: 'text', replyTo: replyToMessage?.id })
            });
            input.innerHTML = '';
            replyToMessage = null;
            const replyDiv = document.getElementById('replyIndicator');
            if (replyDiv) replyDiv.remove();
        } catch (err) {
            showToast('Ошибка отправки', true);
        }
    }

    async function addToFavorites(message) {
        try {
            await api('/api/favorites/messages', {
                method: 'POST',
                body: JSON.stringify({ chatId: currentChatId, messageId: message.id })
            });
            showToast('Добавлено в избранное');
        } catch (err) {}
    }

    async function addToForwardBuffer(message) {
        try {
            await api('/api/forward-buffer', {
                method: 'POST',
                body: JSON.stringify({ message: { ...message, chatId: currentChatId } })
            });
            showToast('Добавлено в буфер');
        } catch (err) {}
    }

    // ============ КАНАЛЫ ============
    function showJoinChannelModal(channelId) {
        pendingChannelId = channelId;
        selectedJoinRole = 'participant';
        document.getElementById('joinChannelModal').style.display = 'flex';
        document.getElementById('adminCodeField').style.display = 'none';
        document.getElementById('ownerCodeField').style.display = 'none';
    }

    document.querySelectorAll('[data-join-role]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-join-role]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedJoinRole = btn.dataset.joinRole;
            document.getElementById('adminCodeField').style.display = selectedJoinRole === 'admin' ? 'block' : 'none';
            document.getElementById('ownerCodeField').style.display = selectedJoinRole === 'owner' ? 'block' : 'none';
        });
    });

    async function confirmJoinChannel() {
        const code = selectedJoinRole === 'admin' ? document.getElementById('joinAdminCode').value :
                    selectedJoinRole === 'owner' ? document.getElementById('joinOwnerCode').value : null;
        try {
            await api(`/api/channels/${pendingChannelId}/join`, {
                method: 'POST',
                body: JSON.stringify({ role: selectedJoinRole, code })
            });
            document.getElementById('joinChannelModal').style.display = 'none';
            await loadAllData();
            openChat(pendingChannelId);
            showToast('Вы присоединились к каналу');
        } catch (err) {
            showToast(err.message, true);
        }
    }

    async function joinTemat(tematId) {
        try {
            await api(`/api/temats/${tematId}/join`, { method: 'POST' });
            await loadAllData();
            openChat(tematId);
            showToast('Вы присоединились к темату');
        } catch (err) {
            showToast(err.message, true);
        }
    }

    // ============ ШКОЛЬНЫЕ ЧАТЫ ============
    async function loadSchoolQuiz(chatId) {
        try {
            const data = await api(`/api/school/${chatId}/quiz`);
            currentQuiz = data.quiz;
            if (currentQuiz) {
                document.getElementById('currentQuizInfo').innerHTML = `
                    <strong>${escapeHtml(currentQuiz.title)}</strong><br>
                    Вопросов: ${currentQuiz.questions.length}<br>
                    Дедлайн: ${currentQuiz.deadline ? new Date(currentQuiz.deadline).toLocaleString() : 'без дедлайна'}
                `;
                document.getElementById('infoSchoolQuiz').style.display = 'block';
            }
        } catch (err) {}
    }

    // ============ ИНИЦИАЛИЗАЦИЯ ============
    document.getElementById('backBtn')?.addEventListener('click', () => {
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('chatView').classList.remove('active');
        currentChatId = null;
        replyToMessage = null;
        const replyDiv = document.getElementById('replyIndicator');
        if (replyDiv) replyDiv.remove();
    });
    
    document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
    document.getElementById('attachBtn')?.addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput')?.addEventListener('change', (e) => {
        if (e.target.files[0]) { currentFile = e.target.files[0]; sendMessage(); }
    });
    
    document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        sendTyping();
    });
    
    document.getElementById('confirmJoinChannelBtn')?.addEventListener('click', confirmJoinChannel);
    document.getElementById('cancelJoinChannelBtn')?.addEventListener('click', () => document.getElementById('joinChannelModal').style.display = 'none');
    
    // Навигация по вкладкам
    document.querySelectorAll('.nav-tab[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab[data-tab]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.getElementById('chatsList').classList.toggle('active', tab === 'chats');
            document.getElementById('channelsList').classList.toggle('active', tab === 'channels');
            document.getElementById('tematsList').classList.toggle('active', tab === 'temats');
            if (tab === 'channels') loadChannels();
            if (tab === 'temats') loadTemats();
        });
    });
    
    // Кнопки авторизации
    document.getElementById('loginBtn')?.addEventListener('click', login);
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('registerModal').style.display = 'flex';
    });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        document.getElementById('registerModal').style.display = 'none';
        document.getElementById('authModal').style.display = 'flex';
    });
    document.getElementById('registerBtn')?.addEventListener('click', register);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('closeProfileBtn')?.addEventListener('click', () => document.getElementById('profileModal').style.display = 'none');
    document.getElementById('profileBtn')?.addEventListener('click', () => {
        document.getElementById('profileAvatar').src = currentUser?.avatar || '';
        document.getElementById('profileUsername').value = currentUser?.username || '';
        document.getElementById('profileModal').style.display = 'flex';
    });
    document.getElementById('profileAvatar')?.addEventListener('click', () => document.getElementById('avatarUpload').click());
    document.getElementById('avatarUpload')?.addEventListener('change', async (e) => {
        if (e.target.files[0]) {
            const formData = new FormData();
            formData.append('avatar', e.target.files[0]);
            const res = await fetch('/api/users/avatar', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                currentUser.avatar = data.avatarUrl;
                showToast('Аватар обновлён');
            }
        }
    });
    
    // Создание чата
    document.getElementById('createChatBtn')?.addEventListener('click', () => {
        document.getElementById('createChatModal').style.display = 'flex';
    });
    document.getElementById('cancelCreateBtn')?.addEventListener('click', () => {
        document.getElementById('createChatModal').style.display = 'none';
    });
    
    document.querySelectorAll('[data-create-type]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-create-type]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCreateType = btn.dataset.createType;
            document.getElementById('privateCreate').style.display = selectedCreateType === 'private' ? 'block' : 'none';
            document.getElementById('groupCreate').style.display = selectedCreateType === 'group' ? 'block' : 'none';
            document.getElementById('channelCreate').style.display = selectedCreateType === 'role-based' ? 'block' : 'none';
            document.getElementById('schoolCreate').style.display = selectedCreateType === 'school' ? 'block' : 'none';
            document.getElementById('communityCreate').style.display = selectedCreateType === 'community' ? 'block' : 'none';
        });
    });
    
    // Проверка авторизации
    if (token) {
        api('/api/verify', { method: 'POST', body: JSON.stringify({ token }) })
            .then(data => {
                if (data.valid) {
                    currentUser = data.user;
                    document.getElementById('authModal').style.display = 'none';
                    loadAllData();
                    connectWebSocket();
                } else {
                    document.getElementById('authModal').style.display = 'flex';
                }
            })
            .catch(() => { document.getElementById('authModal').style.display = 'flex'; });
    } else {
        document.getElementById('authModal').style.display = 'flex';
    }
</script>
</body>
</html>
